<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Head Pose Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        --panel: #f7f7f8;
        --border: #d7d7dc;
        --text: #25262b;
        --muted: #62646a;
        --accent: #1976d2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: #ffffff;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(360px, 420px) 1fr;
        min-height: 100vh;
      }

      .panel {
        padding: 20px;
        overflow: auto;
        background: var(--panel);
        border-right: 1px solid var(--border);
      }

      .viewer {
        position: relative;
        min-width: 0;
        background: #e7e7e7;
      }

      #viewer {
        display: block;
        width: 100%;
        height: 100vh;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      h2 {
        margin: 22px 0 12px;
        font-size: 16px;
      }

      p {
        color: var(--muted);
        line-height: 1.5;
      }

      label {
        display: block;
        margin: 10px 0 4px;
        font-weight: 600;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        font: inherit;
      }

      input,
      textarea,
      select {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #ffffff;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
        font-family: Consolas, "Liberation Mono", monospace;
      }

      button {
        padding: 9px 12px;
        margin-top: 10px;
        color: #ffffff;
        cursor: pointer;
        background: var(--accent);
        border: 0;
        border-radius: 6px;
      }

      button.secondary {
        color: var(--text);
        background: #ffffff;
        border: 1px solid var(--border);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
      }

      .inline input {
        width: auto;
      }

      .status {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: min(520px, calc(100% - 32px));
        padding: 8px 10px;
        color: #ffffff;
        background: rgb(0 0 0 / 62%);
        border-radius: 6px;
        font-size: 13px;
      }

      .hint {
        margin-top: 6px;
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        #viewer {
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <h1>Head Pose Viewer</h1>
        <p>输入 yaw / pitch / roll 精确控制头模姿态，并导出当前角度或批量角度截图。</p>

        <h2>模型</h2>
        <label for="modelPath">GLB 路径</label>
        <select id="modelPath">
          <option value="model/sample_head.glb" selected>内置示例 / Sample head（无需下载）</option>
          <option value="model/person_0/GLB/head_scan_13_photogrammetry_4k.glb">person_0 / GLB 4k</option>
          <option value="model/person_0/GLB/head_scan_13_photogrammetry_1k.glb">person_0 / GLB 1k</option>
          <option value="model/person_0/GLB/head_scan_13_photogrammetry_8k.glb">person_0 / GLB 8k</option>
        </select>
        <button id="loadModel">重新加载模型</button>

        <h2>姿态角度</h2>
        <p class="hint">在右侧视图中拖动鼠标可直接转动模型，角度会实时同步到下方输入框（按住 Shift 拖动控制 Roll）。</p>
        <div class="grid-3">
          <div>
            <label for="yaw">Yaw</label>
            <input id="yaw" type="number" value="0" step="1" />
          </div>
          <div>
            <label for="pitch">Pitch</label>
            <input id="pitch" type="number" value="0" step="1" />
          </div>
          <div>
            <label for="roll">Roll</label>
            <input id="roll" type="number" value="0" step="1" />
          </div>
        </div>
        <button id="resetPose" class="secondary">姿态归零</button>

        <h2>基础校准</h2>
        <p class="hint">如果模型初始方向不是正脸，用这里把“0 度正脸”校准出来。</p>
        <div class="grid-3">
          <div>
            <label for="baseYaw">Base Yaw</label>
            <input id="baseYaw" type="number" value="0" step="1" />
          </div>
          <div>
            <label for="basePitch">Base Pitch</label>
            <input id="basePitch" type="number" value="0" step="1" />
          </div>
          <div>
            <label for="baseRoll">Base Roll</label>
            <input id="baseRoll" type="number" value="0" step="1" />
          </div>
        </div>

        <h2>截图导出</h2>
        <div class="grid-2">
          <div>
            <label for="exportWidth">宽度</label>
            <input id="exportWidth" type="number" value="1024" min="64" step="64" />
          </div>
          <div>
            <label for="exportHeight">高度</label>
            <input id="exportHeight" type="number" value="1024" min="64" step="64" />
          </div>
        </div>
        <label class="inline">
          <input id="fixedCamera" type="checkbox" checked />
          导出前使用固定相机
        </label>
        <button id="exportCurrent">导出当前截图</button>

        <h2>批量角度</h2>
        <p class="hint">每行一组角度，支持表头：yaw,pitch,roll。</p>
        <textarea id="batchAngles">yaw,pitch,roll
0,0,0
30,0,0
-30,0,0
0,15,0
0,-15,0</textarea>
        <button id="exportBatch">批量导出截图</button>
      </aside>

      <section class="viewer">
        <canvas id="viewer"></canvas>
        <div id="status" class="status">正在初始化...</div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
